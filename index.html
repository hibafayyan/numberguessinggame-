<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Number Guessing Game</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

  <h1>Number Guessing Game</h1>

    <div id="levelSection">

        <h2>Select Level</h2>

        <button onclick="startGame(10)">Easy (1-10)</button>

        <button onclick="startGame(50)">Medium (1-50)</button>

        <button onclick="startGame(100)">Hard (1-100)</button>

    </div>


    <div id="gameSection" style="display:none;">

        <h2 id="title"></h2>

        <h3 id="hearts"></h3>
<input
    type="number"
    id="guessInput"
    onkeydown="checkEnter(event)"
>

<button id="checkBtn"  onclick="checkGuess()">
    Check
</button>

        <p id="message"></p>

        <button
        id="restartBtn"
        onclick="restartGame()"
        style="display:none;">
            Restart
        </button>

    </div>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>
    <script src="./app.js"></script>
</body>
</html>
